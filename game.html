<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pac-Man | Seckin Bulgur</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body style="overflow: hidden; background: #000;">
    <a href="index.html" class="back-link">
      <svg
        width="16"
        height="16"
        viewBox="0 0 24 24"

      <span id="hud-lives">LIVES 3</span>

    <canvas id="game"></canvas>

    <script src="game.js"></script>
